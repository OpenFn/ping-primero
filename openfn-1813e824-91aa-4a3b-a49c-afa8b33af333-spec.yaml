        target_job: Flow2-1-Get-Referrals-from-Primero
        condition_type: always
        enabled: true
      Flow2-1-Get-Referrals-from-Primero->Flow2-2-Send-Referral-to-Ping:
        source_job: Flow2-1-Get-Referrals-from-Primero
        target_job: Flow2-2-Send-Referral-to-Ping
        condition_type: on_job_success
        enabled: true
      Flow2-2-Send-Referral-to-Ping->Check-Status:
        source_job: Flow2-2-Send-Referral-to-Ping
        target_job: Check-Status
        condition_type: on_job_success
        enabled: true
