name: primero-ping
description: |
  Primero - PING integration for UNICEF-UNHCR collaboration

collections: null
credentials:
  hunter@openfn.org-Official-Ping-credentials:
    name: Official Ping credentials
    owner: hunter@openfn.org
  hunter@openfn.org-PING-Credentials:
    name: PING Credentials
    owner: hunter@openfn.org
  hunter@openfn.org-Primero-PING:
    name: Primero PING
    owner: hunter@openfn.org
  rediet@openfn.org-Ping-Credential-Rediet:
    name: Ping Credential Rediet
    owner: rediet@openfn.org
  rediet@openfn.org-Primero-Gambella:
    name: Primero Gambella
    owner: rediet@openfn.org
  rediet@openfn.org-Primero-Gambella-API-User:
    name: Primero Gambella API User
    owner: rediet@openfn.org
workflows:
  Flow-2-2.UNHCR-Ping-to-Primero:
    name: Flow 2-2.UNHCR Ping to Primero
    jobs:
      Fetch-decision-records-from-proGres-via-PING:
        name: Fetch decision records from proGres via PING
        adaptor: '@openfn/language-ping@1.0.1'
        credential: hunter@openfn.org-Official-Ping-credentials
        body: |
          
          // Query params fails
          http.post('/primes/fetch/paging/v3/retrievedatawithpaging', {
            "ShippingProcessId": "SHP-2795",
            "PartnerId": "PNR-1363",
            "InteropID": "INT-1436",
            "APIVersion": "V3",
            "QueryParameters": [
              // {
              // "ParameterName": "{progres_interoperabilityreferralstatus}",
              // "Value": "[125080001, 125080002]"
              // }
            ]
          });

          fn(state => {
            const allowedStatuses = [125080001, 125080002];

            const raw = state.data?.Data;

            // If PING returns "No Data Available", treat it as empty
            if (!raw || raw === "No Data Available") {
              console.log("No decision records returned from PING.");
              state.referralIds = [];
              state.data = {};
              return state;
            }

            state.referralIds = raw
              .filter(item =>
                allowedStatuses.includes(item.progres_interoperabilityreferralstatus)
              )
              .map(item => item.progres_interoperabilityreferralid);
            state.data = {}
            return state;
          });

      Fetch-full-decision-details:
        name: Fetch full decision details
        adaptor: '@openfn/language-ping@1.0.1'
        credential: hunter@openfn.org-Official-Ping-credentials
        body: |
          fn(state =>{

            state.decisionRecords = [];
          return state
          })

          each('$.referralIds[*]', http.post('/primes/fetch/paging/v3/retrievedatawithpaging', {
            "ShippingProcessId": "SHP-2796",
            "PartnerId": "PNR-1363",
            "InteropID": "INT-1436",
            "APIVersion": "V3",
            "QueryParameters": [
              {
              "ParameterName": "{record_ids}",
              "Value": `${[$.data]}`
              }
            ]
          }).then(state =>{

            state.decisionRecords.push(state.data.Data[0])
            return state
          }))

          fn(state =>{

          return {decisionRecords:state.decisionRecords, data:{}, references:[]}
          })

      Map-decision-to-Primero-payload:
        name: Map decision to Primero payload
        adaptor: '@openfn/language-common@3.2.2'
        credential: null
        body: |
          fn(state => {
            state.decisionPayload = []
            return state
          })

          function statusText(status) {
            switch (status) {
              case 125080001:
              case 125080000:
                return "accepted"
              case 125080002:
                return "rejected"
              default:
                return "accepted"
            }
          }

          each('$.decisionRecords[*]', fn(state => {
            const r = state.data;
            const status = r.progres_interoperabilityreferralstatus || r.progres_reviewdecision;
            const case_id = r.progres_offlineid;
            const service_id = r.progres_orgreferralid;
            const interoperability_referral_id = r.progres_interoperabilityreferralid; // proGres UUID — used to update status in PING after Primero sync

            const payload = {
              "case_id": case_id,
              "service_id": service_id,
              interoperability_referral_id,
              "type": "Referral",
              "record_type": "case",
              "status": statusText(status),
              "rejected_reason": statusText(status) === "rejected"
                ? `${r.progres_interoperabiltyreferralrejectionreasonname || "Rejected in proGres (no reason provided)"} — ${r.progres_interoperabilityreferralrejectionomment || "No comment provided"}`
                : null
            }

            state.decisionPayload.push(payload)
            return state
          }));

          fn(state => {
            return { decisionPayload: state.decisionPayload, data: {}, references: [] }
          })

      Update-Referral-Decision-in-Primero:
        name: Update Referral Decision in Primero
        adaptor: '@openfn/language-primero@4.0.8'
        credential: rediet@openfn.org-Primero-Gambella-API-User
        body: |
          // Reverse lookup: proGres service GUID -> Primero service_type key
          const serviceMap = {
            legal_support: "7ad37dd0-0306-e611-80d9-00155d34051a",
            medical: "f98e1516-0406-e611-80d9-00155d34051a",
            shelter: "20db76a2-0306-e611-80d9-00155d34051a",
            education_formal: "79f7aee2-309e-e911-80e6-001dd8b71fe6",
            non_formal_education: "79f7aee2-309e-e911-80e6-001dd8b71fe6",
            cash_assistance: "14d89ab0-0306-e611-80d9-00155d34051a",
            documentation: "f6dd29c1-0306-e611-80d9-00155d34051a",
            livelihoods: "80c37762-0406-e611-80d9-00155d34051a",
            nutrition: "fab93078-7005-e611-80d9-00155d34051a",
            basic_psychosocial_support: "3408e901-0406-e611-80d9-00155d34051a",
            specialized_mhpss_services: "3408e901-0406-e611-80d9-00155d34051a",
            focuses_non_specialized_mhpss_care: "3408e901-0406-e611-80d9-00155d34051a",
            relocation: "ca34f86f-0406-e611-80d9-00155d34051a",
            durable_solution_in_coordination_with_unhcr: "ca34f86f-0406-e611-80d9-00155d34051a",
            other_please_specify: "e3a13f7d-0406-e611-80d9-00155d34051a",
          };

          const reverseServiceMap = Object.fromEntries(
            Object.entries(serviceMap).map(([k, v]) => [v, k])
          );

          fn(state => {
            state.syncedReferralIds = [];
            return state;
          });

          const findReferral = (referrals, service_id) => {
            const referral = referrals.find(
              referral => referral.service_record_id === service_id
            );
            return referral;
          };

          each('$.decisionPayload[*]', fn(state => {
            const { case_id, service_id, interoperability_referral_id, ...decision } = state.data;

            return getReferrals({ externalId: 'case_id', id: case_id })(state)
              .then(state => {
                const referrals = state.data;
                const referral = findReferral(referrals, service_id);

                if (!referral) {
                  console.log(`No referral found for case_id ${case_id}. Skipping update.`);
                  return state;
                }

                decision['id'] = referral.id;
                decision['record_id'] = referral.record_id;

                console.log(`Found referral ${referral.id} for case ${case_id}. Sending decision: ${decision.status}`);

                return updateReferral(
                  {
                    caseExternalId: 'case_id',
                    caseId: case_id,
                    id: referral.id,
                    data: decision,
                  },
                  state => {
                    console.log(`Referral decision update successful for case: ${case_id}`);
                    state.syncedReferralIds.push(interoperability_referral_id);
                    return state;
                  }
                )(state);
              })
              .catch(error => {
                console.log(`No case found for ${case_id}. Skipping this referral decision.`);
                return state;
              });
          }));
      Save-Status-in-Progres:
        name: Save Status in Progres
        adaptor: '@openfn/language-ping@1.0.2'
        credential: hunter@openfn.org-Official-Ping-credentials
        body: |
          fn(state => {
            const failed = state.decisionPayload
              .filter(item => item.interoperability_referral_id)
              .filter(item => !state.syncedReferralIds.includes(item.interoperability_referral_id));

            if (failed.length > 0) {
              console.log(`Skipping PING status update for ${failed.length} referral(s) that failed to sync with Primero. They will be retried on the next run.`);
              failed.forEach(item =>
                console.log(`  - Skipped referral: ${item.interoperability_referral_id} (case: ${item.case_id})`)
              );
            }

            state.pingStatusPayloads = state.decisionPayload
              .filter(item => item.interoperability_referral_id)
              .filter(item => state.syncedReferralIds.includes(item.interoperability_referral_id))
              .map(item => ({
                "ExternalId": item.interoperability_referral_id,
                "Attachments": [],
                "Fields": [
                  { "Name": "progres_interoperabilityreferralid", "Value": item.interoperability_referral_id },
                  { "Name": "progres_interoperabilityreferralstatus", "Value": "125080003" },
                  { "Name": "progres_comments", "Value": "Referral decision synced with PRIMERO via OpenFn" }
                ]
              }));

            console.log(`Preparing to mark ${state.pingStatusPayloads.length} referral(s) as Synced with PRIMERO`);
            return state;
          });

          fn(state => {
            if (state.pingStatusPayloads.length === 0) {
              console.log('No referrals to mark as synced in PING. Skipping.');
              return state;
            }

            return http.post('/api/ingestion/v2/PNR-1363/data', state => ({
              "ShippingProcessId": "SHP-2284",
              "InteropId": "INT-1436",
              "Data": state.pingStatusPayloads
            }))(state)
              .then(state => {
                console.log(`Status updated to Synced with PRIMERO for ${state.pingStatusPayloads.length} referral(s)`);
                return state;
              })
              .catch(error => {
                console.log(`Failed to update PING status. Error: ${error.message}`);
                throw error;
              });
          });

    triggers:
      cron:
        type: cron
        cron_expression: '0 0 * * *'
        cron_cursor_job: Fetch-decision-records-from-proGres-via-PING
        enabled: false
    edges:
      cron->Fetch-decision-records-from-proGres-via-PING:
        source_trigger: cron
        target_job: Fetch-decision-records-from-proGres-via-PING
        condition_type: always
        enabled: true
      Fetch-decision-records-from-proGres-via-PING->Fetch-full-decision-details:
        source_job: Fetch-decision-records-from-proGres-via-PING
        target_job: Fetch-full-decision-details
        condition_type: js_expression
        condition_label: null
        condition_expression: |
          !state.errors && state.referralIds && state.referralIds.length > 0

        enabled: true
      Fetch-full-decision-details->Map-decision-to-Primero-payload:
        source_job: Fetch-full-decision-details
        target_job: Map-decision-to-Primero-payload
        condition_type: on_job_success
        enabled: true
      Map-decision-to-Primero-payload->Update-Referral-Decision-in-Primero:
        source_job: Map-decision-to-Primero-payload
        target_job: Update-Referral-Decision-in-Primero
        condition_type: on_job_success
        enabled: true
      Update-Referral-Decision-in-Primero->Save-Status-in-Progres:
        source_job: Update-Referral-Decision-in-Primero
        target_job: Save-Status-in-Progres
        condition_type: on_job_success
        enabled: true
  Flow1-1.-Send-Referrals-to-Primero:
    name: Flow1-1. Send Referrals to Primero
    jobs:
      Retrieve-pending-referrals:
        name: Retrieve pending referrals
        adaptor: '@openfn/language-ping@1.0.0'
        credential: hunter@openfn.org-Official-Ping-credentials
        body: |
          fn(state => ({
            ...state,
            data: {
              Data: [],
              RecordCount: null,
              ErrorMessage: null,
              PagingSummary: null,
            },
          }));

          http.post('/primes/fetch/paging/v3/retrievedatawithpaging', {
            "ShippingProcessId": "SHP-2747", // Retrieve referral records from proGres deliveries table, interventions, individuals
            "PartnerId": "PNR-1363",
            "InteropID": "INT-1436",
            "APIVersion": "V3",
            "QueryParameters": []
          });

      Send-Upload-Status-to-Ping:
        name: Send Upload Status to Ping
        adaptor: '@openfn/language-ping@1.0.0'
        credential: hunter@openfn.org-Official-Ping-credentials
        body: |
          fn(state => {


            state.data = state.interventions.map(item => {

              return {
                "ShippingProcessId": "SHP-2748",
                "InteropId": "INT-1436",
                "Data": [
                  {
                    "ExternalId": "id55",
                    "Fields": [
                      {
                        "Name": "progres_lpinterventionid",
                        "Value": item.progres_lpinterventionid ?? ''
                      },
                      {
                        "Name": "progres_businessunit",
                        "Value": item.progres_businessunit
                      },
                      {
                        "Name": "progres_primerotransferstatus",  // the field we are updating
                        "Value": "125080002" // Pending
                      },
                      {
                        "Name": "progres_primerotransferstatusdate",
                        "Value": new Date().toISOString().slice(0, 10)
                        // Pending
                      }
                    ]
                  }
                ]
              }
            })

            // console.log({ data: state.data })

            // console.log(
            // 	`Sending success message to Ping for case_id ${data.case_id} and progres_interventionnumber ${data.progres_interventionnumber}`
            // );

            return state;
          });

          each('$.data[*]', http.post('/api/ingestion/v2/PNR-1363/data', state => state.data)
            .then((state) => {
              console.log('Message sent to Ping/Progres.');
              return state;
            })
            .catch(error => {
              let newError = error;
              newError.config = 'REDACTED';
              throw newError;
            }))

      Send-Referrals-to-Primero:
        name: Send Referrals to Primero
        adaptor: '@openfn/language-primero@4.0.8'
        credential: rediet@openfn.org-Primero-Gambella
        body: |
          each(
            '$.interventions[*]',
            fn(state => {
              const { data } = state;
              const calculateAge = dob => {
                const diff = Date.now() - dob.getTime();
                const age_dt = new Date(diff);
                return Math.abs(age_dt.getUTCFullYear() - 1970);
              };

              const formatDate = (date, format) => {
                if (!date) return null;
                date = date.split(/\s|T/g)[0];
                const parts = date.match(/(\d+)/g);
                if (!parts) return null;

                let year, day;
                if (parts[0].length === 4) {
                  year = parts[0];
                  day = parts[2];
                } else {
                  year = parts[2];
                  day = parts[0];
                }

                const yearFinal = String(year).length > 2 ? year : `20${year}`;
                const month = String(parts[1]).length === 2 ? parts[1] : `0${parts[1]}`;
                const dayFinal = String(day).length === 2 ? day : `0${day}`;

                if (format.substring(0, 4) === 'YYYY') {
                  const separator = format.substring(4, 5);
                  return `${yearFinal}${separator}${month}${separator}${dayFinal}`;
                }
                if (format.substring(0, 2) === 'DD') {
                  const separator = format.substring(2, 3);
                  return `${dayFinal}${separator}${month}${separator}${yearFinal}`;
                }
              };

              const stripHtml = str =>
                str
                  .replace(/<[^>]+>/g, ' ')
                  .replace(/&nbsp;/g, ' ')
                  .replace(/&amp;/g, '&')
                  .replace(/&lt;/g, '<')
                  .replace(/&gt;/g, '>')
                  .replace(/\s+/g, ' ')
                  .trim();

              const progres_description = data['progres_interventiontype2.interventiontype.progres_description'];

              const serviceMap = {
                'Alternative Care': 'alternative_care',
                BID: 'focuses_non_specialized_mhpss_care',
                BIA: 'focuses_non_specialized_mhpss_care',
                'Family Tracing and Reunification': 'food',
                'Advocacy / Direct intervention': 'other_please_specify',
              };
              state.serviceMap = serviceMap;

              const serviceMapArray = Object.keys(serviceMap);

              if (!serviceMapArray.includes(progres_description)) {
                throw new Error(
                  `Service value shared (${progres_description}) with progres_interventionnumber '${data.progres_interventionnumber}' is not an accepted UNICEF service type.\n\tPlease see the mapping specifications.`
                );
              }

              const sexMap = {
                125080000: 'female',
                125080001: 'male',
                125080002: 'other_b25f252',
                125080003: 'unknown_4b34795',
              };

              const languageMap = {
                Anyuak: 'language1',
                Acholi: 'language10',
                Amharic: 'language5',
                Bari: 'language4',
                Bembe: 'language7',
                'Dinka, Northeastern': 'language3',
                'Dinka, Northwestern; Alor': 'language3',
                'Dinka, South Central': 'language3',
                'Dinka, Southeastern;': 'language3',
                'Dinka, Southeastern': 'language3',
                'Dinka, Southwestern; Rek': 'language3',
                Nuer: 'language2',
                Somali: 'language8',
                'Cutchi-swahili': 'language1',
                Swahili: 'language1',
                'Swahili, Congo': 'language1',
                Zande: 'language5',
              };

              let lang = [];
              if (data._languages && data._languages.length > 0) {
                lang = data._languages
                  .map(langName => languageMap[langName] || 'language6')
                  .filter((v, i, a) => a.indexOf(v) === i);
              } else if (data['progres_language.progres_languagecodeidname']) {
                lang.push(languageMap[data['progres_language.progres_languagecodeidname']] || 'language6');
              }

              const address_current = [
                data['individuals.progres_coalocationlevel1']?.Name,
                data['individuals.progres_coalocationlevel2']?.Name,
                data['individuals.progres_coalocationlevel3']?.Name,
                data['individuals.progres_coalocationlevel4']?.Name,
                data['individuals.progres_coalocationlevel5']?.Name,
                data['individuals.progres_coalocationlevel6']?.Name,
              ]
                .filter(Boolean)
                .join(' ') || null;

              const progres_sex = data['progres_individual.individuals.progres_sex'];
              const provided =
                (progres_description &&
                  data['progres_individual.individuals.progres_id'] &&
                  data['progres_individual.individuals.progres_registrationgroupid'] &&
                  data['progres_individual.individuals.progres_givenname'] &&
                  data['progres_individual.individuals.progres_familyname']) !== undefined;

              const missingFields = [];
              if (!progres_description)
                missingFields.push('progres_interventiontype2.interventiontype.progres_description');
              if (!data['progres_individual.individuals.progres_id'])
                missingFields.push('progres_individual.individuals.progres_id');
              if (!data['progres_individual.individuals.progres_registrationgroupid'])
                missingFields.push('progres_individual.individuals.progres_registrationgroupid');
              if (!data['progres_individual.individuals.progres_givenname'])
                missingFields.push('progres_individual.individuals.progres_givenname');
              if (!data['progres_individual.individuals.progres_familyname'])
                missingFields.push('progres_individual.individuals.progres_familyname');
              if (!data['progres_individual.individuals.progres_dateofbirth'])
                missingFields.push('progres_individual.individuals.progres_dateofbirth');
              if (!data['progres_individual.individuals.progres_sex'])
                missingFields.push('progres_individual.individuals.progres_sex');

              if (!provided) {
                throw new Error(
                  `Intervention referral is missing fields required for sending to Primero: ${missingFields.join(',')}. Please include missing fields and re-send the request`
                );
              }

              const service_type = data['progres_interventiontype2.interventiontype.progres_description'];
              const today = formatDate(new Date().toISOString(), 'YYYY-MM-DD');

              const newService = {
                service_appointment_date: data.progres_interventionstartdate
                  ? data.progres_interventionstartdate.split('T')[0]
                  : null,
                service_response_day_time: data.progres_primerotransferstatusdate
                  ? new Date(data.progres_primerotransferstatusdate).toISOString()
                  : null,
                service_request_external: true,
                service_request_title: data['systemuser.title'] || '',
                service_request_agency: 'UNHCR',
                service_request_phone: data['systemuser.su.mobilephone'],
                service_request_email: data['systemuser.su.internalemailaddress'],
                service_referral_notes: [data.progres_interventiondescription, data.progres_reasonforreferral]
                  .filter(Boolean)
                  .map(stripHtml)
                  .join(', '),
                service_type: serviceMap[service_type] || 'focuses_non_specialized_mhpss_care',
                service_implementing_agency: 'UNICEF',
                service_response_type: 'service_provision',
                service_referral: 'external_referral',
                unhcr_referral_status: 'pending',
                progres_interventionnumber:
                  data.progres_interventionnumber + ',' + data.progres_lpinterventionid + ',' + data.progres_businessunit,
              };

              const body = {
                services_section: [newService], // used for new case creation
                unhcr_individual_no: data['progres_individual.individuals.progres_id'],
                unhcr_id_no: data['progres_individual.progres_registrationgroupidname'],
                name_first: data['progres_individual.individuals.progres_givenname'],
                name_middle: data['progres_individual.individuals.progres_middlename'],
                name_last: data['progres_individual.individuals.progres_familyname'],
                name_nickname: data['progres_individual.individuals.progres_commonyusedname'],
                date_of_birth: data['progres_individual.individuals.progres_dateofbirth'].split('T')[0],
                age: data['progres_individual.individuals.progres_dateofbirth']
                  ? calculateAge(new Date(data['progres_individual.individuals.progres_dateofbirth']))
                  : undefined,
                sex: data['progres_individual.individuals.progres_sex'] ? sexMap[progres_sex] : undefined,
                telephone_current: data['progres_individual.individuals.progres_primaryphonenumber'],
                address_current,
                language: lang[0] ? lang : null,
                status: 'open',
                case_id: data.progres_primeroid ? data.progres_primeroid : undefined,
                module_id: 'primeromodule-cp',
              };

              return getCases(
                {
                  remote: true,
                  unhcr_individual_no: data['progres_individual.individuals.progres_id'],
                },
                {},
                next => {
                  // ── NO CASE FOUND ──────────────────────────────────────────────
                  if (next.data.length === 0) {
                    if (data.progres_primeroid) {
                      console.log(
                        `No case found by unhcr_individual_no, but proGres has primeroid ${data.progres_primeroid}. Creating new case without case_id.`
                      );
                      const createBody = { ...body };
                      delete createBody.case_id;
                      return createCase(createBody, resp => {
                        console.log(`New case created: ${resp.data.case_id}`);
                        return resp;
                      })(next);
                    }

                    return createCase(body, resp => {
                      console.log(`New case created: ${resp.data.case_id}`);
                      return resp;
                    })(next);
                  }

                  // ── CASE(S) FOUND — APPEND the new service ─────────────────────
                  const existingCase = next.data[0];
                  const existingServices = existingCase.services_section || [];

                  const alreadyExists = existingServices.some(svc =>
                    svc.progres_interventionnumber?.startsWith(data.progres_interventionnumber)
                  );

                  if (alreadyExists) {
                    console.log(`Service for intervention ${data.progres_interventionnumber} already exists. Skipping.`);
                    return next;
                  }

                  // Only send the new service — Primero appends via unique_id
                  const updatedBody = {
                    services_section: [newService],
                  };

                  return updateCase(existingCase.id, updatedBody, resp => {
                    console.log(`Updated ${resp.data.id} @ ${resp.data.last_updated_at}`);
                    return resp;
                  })(next);
                }
              )(state);
            })
          );

      Retrieve-full-intervention-details:
        name: Retrieve full intervention details
        adaptor: '@openfn/language-ping@latest'
        credential: hunter@openfn.org-Official-Ping-credentials
        body: |
          // fn(state => {
          //   const { Data } = state.data;
          //   state.referrals = Data;
          //   state.interventions = [];
          //   return state
          // })
          // each('$.referrals[*]', http.post('/primes/fetch/paging/v3/retrievedatawithpaging', {
          //   "ShippingProcessId": "SHP-2358", // Retrieve referral records from proGres deliveries table, interventions, individuals
          //   "PartnerId": "PNR-1363",
          //   "InteropID": "INT-1436",
          //   "APIVersion": "V3",
          //   "QueryParameters": [
          //     {
          //       "ParameterName": "{record_ids}",
          //       "Value": state => state.data.progres_lpinterventionid //interventionNumber
          //     }
          //   ]
          // }).then(state => {

          //   const data = state.data.Data.map(item => ({ ...item, progres_lpinterventionid: state.referrals[state.index].progres_lpinterventionid }));

          //   state.interventions.push(...data)
          //   return state
          // }));
          fn(state => {
            const { Data } = state.data;
            state.referrals = Data;
            state.interventions = [];
            return state;
          });

          each('$.referrals[*]',
            http.post('/primes/fetch/paging/v3/retrievedatawithpaging', {
              "ShippingProcessId": "SHP-2358",
              "PartnerId": "PNR-1363",
              "InteropID": "INT-1436",
              "APIVersion": "V3",
              "QueryParameters": [
                {
                  "ParameterName": "{record_ids}",
                  "Value": state => state.data.progres_lpinterventionid
                }
              ]
            }).then(state => {
              const rawData = state.data.Data;
              const lpInterventionId = state.referrals[state.index].progres_lpinterventionid;

              // Group by intervention number and aggregate
              const grouped = {};

              for (const record of rawData) {
                const key = record.progres_interventionnumber;

                if (!grouped[key]) {
                  // First record - use as base
                  grouped[key] = {
                    ...record,
                    progres_lpinterventionid: lpInterventionId,
                    // Initialize aggregation arrays
                    _languages: new Set(),
                    _specificNeeds: []
                  };
                }

                // Aggregate languages (dedupe via Set)
                const langName = record['progres_language.progres_languagecodeidname'];
                if (langName) {
                  grouped[key]._languages.add(langName);
                }

                // Aggregate specific needs (category + subcategory pairs)
                const spnCategory = record['progres_specificneed.progres_spncategory2name'];
                const spnSubcategory = record['progres_specificneed.progres_spnsubcategory2name'];
                if (spnCategory) {
                  const exists = grouped[key]._specificNeeds.some(
                    sn => sn.category === spnCategory && sn.subcategory === spnSubcategory
                  );
                  if (!exists) {
                    grouped[key]._specificNeeds.push({
                      category: spnCategory,
                      subcategory: spnSubcategory,
                      categoryId: record['progres_specificneed.specificneeds.progres_spncategory2'],
                      subcategoryId: record['progres_specificneed.specificneeds.progres_spnsubcategory2']
                    });
                  }
                }
              }

              // Convert to array and finalize
              const dedupedData = Object.values(grouped).map(record => {
                record._languages = Array.from(record._languages);
                return record;
              });

              console.log(`SHP-2358 returned ${rawData.length} records, deduplicated to ${dedupedData.length}`);

              state.interventions.push(...dedupedData);
              return state;
            })
          );

